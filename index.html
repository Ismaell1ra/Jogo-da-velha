<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Velha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Jogo da Velha</h1>
    <div id="placar">
      <span id="jogadorX">X: 0</span>
      <span id="jogadorO">O: 0</span>
    </div>
    <div id="tabuleiro">
      <div class="casa" data-pos="0"></div>
      <div class="casa" data-pos="1"></div>
      <div class="casa" data-pos="2"></div>
      <div class="casa" data-pos="3"></div>
      <div class="casa" data-pos="4"></div>
      <div class="casa" data-pos="5"></div>
      <div class="casa" data-pos="6"></div>
      <div class="casa" data-pos="7"></div>
      <div class="casa" data-pos="8"></div>
    </div>
    <div id="status">Jogador X Começa!</div>
    <button id="reiniciar">Novo Jogo</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
